<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="lucaswei 的个人主页 - 专注于探索 Web 前沿技术，热爱开源与纯粹的代码。">
    <title>lucaswei | Home</title>
    
    <!-- Load TailwindCSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <script>
        // Inline script to avoid theme flashing
        const getTheme = () => {
            const theme = localStorage.getItem("theme");
            if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                return "dark";
            }
            return "light";
        };
        const applyTheme = (doc) => {
            const theme = getTheme();
            if (theme === "dark") {
                doc.documentElement.classList.add("dark");
            } else {
                doc.documentElement.classList.remove("dark");
            }
        };
        applyTheme(document);
    </script>
</head>
<body class="bg-white dark:bg-[#121212] text-neutral-900 dark:text-neutral-50 antialiased flex flex-col items-center min-h-screen transition-colors duration-300">
    <main class="w-full px-6 py-16 flex-1 flex flex-col max-w-[680px]">
        <div class="max-w-2xl mx-auto px-6 py-16 flex flex-col items-center min-h-[60vh] justify-center">
            <header class="flex flex-col items-center text-center">
                <img src="/images/avatar.webp" alt="lucaswei Avatar" loading="eager" width="192" height="192" class="w-24 h-24 rounded-full mb-6 object-cover shadow-sm ring-4 ring-neutral-50 dark:ring-neutral-900">
                <h1 class="text-3xl font-light text-neutral-800 dark:text-neutral-200 tracking-tight">
                    Hi, I'm 
                    <span class="font-bold text-black dark:text-white">lucaswei</span>
                </h1>
                <p class="mt-3 text-neutral-500 dark:text-neutral-400 text-base font-light">Exploring cutting-edge Web technologies, passionate about open-source and clean code.</p>
            </header>
            <nav class="mt-8 mb-12 flex w-full max-w-md flex-wrap items-center justify-center gap-y-4 sm:gap-x-10">
                <a href="/blog/" class="group relative text-center text-base font-medium text-neutral-500 transition-colors hover:text-black dark:hover:text-white basis-1/3 sm:basis-auto">
                     Blog 
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-black dark:bg-white transition-all group-hover:w-full"></span>
                </a>
                <a href="https://github.com/lucaswei763" target="_blank" class="group relative text-center text-base font-medium text-neutral-500 transition-colors hover:text-black dark:hover:text-white basis-1/3 sm:basis-auto">
                     GitHub 
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-black dark:bg-white transition-all group-hover:w-full"></span>
                </a>
                <a href="https://github.com/lucaswei763?tab=repositories" target="_blank" class="group relative text-center text-base font-medium text-neutral-500 transition-colors hover:text-black dark:hover:text-white basis-1/3 sm:basis-auto">
                     Projects 
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-black dark:bg-white transition-all group-hover:w-full"></span>
                </a>
                <a href="mailto:me@lucaswei.xyz" class="group relative text-center text-base font-medium text-neutral-500 transition-colors hover:text-black dark:hover:text-white basis-1/3 sm:basis-auto">
                     Email 
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-black dark:bg-white transition-all group-hover:w-full"></span>
                </a>
            </nav>
        </div>
    </main>
    <footer class="w-full max-w-[680px] px-6 pb-16 text-sm text-neutral-500 dark:text-neutral-400 text-center">
        <p class="mb-4">
            Copyright &copy; 2026
            <a href="/" class="hover:text-neutral-800 dark:hover:text-neutral-200 transition-colors">lucaswei</a>
        </p>
        <div class="flex justify-center items-center mt-6">
            <div class="inline-flex bg-neutral-100 dark:bg-neutral-900 p-1 rounded-full border border-neutral-200 dark:border-neutral-800">
                <button data-theme-btn="light" title="Light Mode" class="p-1.5 rounded-full transition-all hover:text-neutral-900 dark:hover:text-neutral-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="lucide lucide-sun w-4 h-4">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2"></path>
                        <path d="M12 20v2"></path>
                        <path d="m4.93 4.93 1.41 1.41"></path>
                        <path d="m17.66 17.66 1.41 1.41"></path>
                        <path d="M2 12h2"></path>
                        <path d="M20 12h2"></path>
                        <path d="m6.34 17.66-1.41 1.41"></path>
                        <path d="m19.07 4.93-1.41 1.41"></path>
                    </svg>
                </button>
                <button data-theme-btn="system" title="System Preference" class="p-1.5 rounded-full transition-all hover:text-neutral-900 dark:hover:text-neutral-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="lucide lucide-monitor w-4 h-4">
                        <rect width="20" height="14" x="2" y="3" rx="2"></rect>
                        <line x1="8" x2="16" y1="21" y2="21"></line>
                        <line x1="12" x2="12" y1="17" y2="21"></line>
                    </svg>
                </button>
                <button data-theme-btn="dark" title="Dark Mode" class="p-1.5 rounded-full transition-all hover:text-neutral-900 dark:hover:text-neutral-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="lucide lucide-moon w-4 h-4">
                        <path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"></path>
                    </svg>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const updateActiveButton = () => {
            const currentTheme = localStorage.getItem("theme") || "system";
            document.querySelectorAll("[data-theme-btn]").forEach(t => {
                if (t.getAttribute("data-theme-btn") === currentTheme) {
                    t.classList.add("bg-white", "dark:bg-neutral-800", "shadow-sm", "text-neutral-900", "dark:text-neutral-100");
                } else {
                    t.classList.remove("bg-white", "dark:bg-neutral-800", "shadow-sm", "text-neutral-900", "dark:text-neutral-100");
                }
            });
        };

        const setupThemeToggle = () => {
            document.querySelectorAll("[data-theme-btn]").forEach(s => {
                s.addEventListener("click", () => {
                    const theme = s.getAttribute("data-theme-btn");
                    if (theme === "system") {
                        localStorage.removeItem("theme");
                        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                            document.documentElement.classList.add("dark");
                        } else {
                            document.documentElement.classList.remove("dark");
                        }
                    } else {
                        localStorage.setItem("theme", theme);
                        if (theme === "dark") {
                            document.documentElement.classList.add("dark");
                        } else {
                            document.documentElement.classList.remove("dark");
                        }
                    }
                    updateActiveButton();
                });
            });
            updateActiveButton();
        };

        setupThemeToggle();

        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e => {
            if (!localStorage.getItem("theme")) {
                if (e.matches) {
                    document.documentElement.classList.add("dark");
                } else {
                    document.documentElement.classList.remove("dark");
                }
                updateActiveButton();
            }
        });
    </script>
</body>
</html>
